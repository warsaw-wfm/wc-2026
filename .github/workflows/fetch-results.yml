name: Fetch WC Results

on:
  schedule:
    # Run every hour from 17:00–07:00 UTC (covers all WC 2026 kickoff windows)
    # Script exits instantly if no pending matches — zero API quota used
    - cron: '0 17,18,19,20,21,22,23,0,1,2,3,4,5,6,7 * * *'
  workflow_dispatch: # Manual trigger from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Fetch and score results
        run: node fetch-results.js
        working-directory: scripts
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
